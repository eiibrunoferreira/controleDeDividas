<!doctype html>
<html lang="pt_BR">

<head>
  <meta charset="UTF-8" />

  <!-- Ícone padrão do navegador -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Ícones para iOS (Apple) -->
  <link rel="apple-touch-icon" href="/controleDeDividas/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Controle de Dívidas">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#18181b" />
  <title>Controle Financeiro</title>

  <style>
    #root {
      min-height: 100vh;
      background: #18181b;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #18181b;
    }

    #splash-screen {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #18181b;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 20px;
      color: white;
      font-family: sans-serif;
    }

    #img-splash {
      border-radius: 15%;
    }

    #splash-screen.fade-out {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-content">
      <img id="img-splash" src="/pwa-512x512.png" alt="Logo" width="90" />
      <div class="spinner"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
